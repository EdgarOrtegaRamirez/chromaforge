name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24']
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
    
    - name: Build
      run: go build ./cmd/chromaforge/
    
    - name: Test
      run: go test ./... -v
    
    - name: Vet
      run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'
    
    - name: Vet
      run: go vet ./...
    
    - name: Format Check
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Files not formatted:"
          gofmt -l .
          exit 1
        fi
